name: Build and Release NuGet Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup NuGet
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: 'latest'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'microsoft'
        
    - name: Install Xamarin.Android
      run: |
        sudo dotnet workload install android
        
    - name: Restore NuGet packages
      run: |
        nuget restore TrueMetrics.Xamarin.sln
        
    - name: Build project
      run: |
        msbuild TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj \
          /p:Configuration=Release \
          /p:TargetFrameworkVersion=v13.0 \
          /restore
          
    - name: Pack NuGet package
      run: |
        nuget pack TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.nuspec \
          -OutputDirectory TrueMetrics.Xamarin.Android/bin/Release \
          -Version ${{ github.ref_name == 'main' && '1.5.3' || github.ref_name }}
          
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: |
          TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
          TrueMetrics.Xamarin.Android/bin/Release/*.dll
          
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to NuGet.org (optional)
      if: startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
      run: |
        nuget push TrueMetrics.Xamarin.Android/bin/Release/*.nupkg \
          -ApiKey ${{ secrets.NUGET_API_KEY }} \
          -Source https://api.nuget.org/v3/index.json \
          -SkipDuplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
