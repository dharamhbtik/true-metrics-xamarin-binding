name: Build and Release NuGet Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PACKAGE_VERSION: '1.5.4'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'microsoft'
        
    - name: Install Xamarin.Android workloads
      run: |
        sudo dotnet workload install android
        
    - name: Install Mono (includes MSBuild)
      run: |
        brew install mono
        echo "/Library/Frameworks/Mono.framework/Versions/Current/bin" >> $GITHUB_PATH
        
    - name: Restore packages with MSBuild
      run: |
        msbuild TrueMetrics.Xamarin.sln /t:Restore /p:Configuration=Release
        
    - name: Build project
      run: |
        msbuild TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj \
          /p:Configuration=Release \
          /p:TargetFrameworkVersion=v13.0 \
          /p:PackageVersion=${{ env.PACKAGE_VERSION }}
          
    - name: Pack NuGet package with MSBuild
      run: |
        msbuild TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj \
          /t:Pack \
          /p:Configuration=Release \
          /p:PackageVersion=${{ env.PACKAGE_VERSION }} \
          /p:NuspecFile=TrueMetrics.Xamarin.Android.nuspec
          
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: |
          TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
          TrueMetrics.Xamarin.Android/bin/Release/*.dll
          
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to NuGet.org (optional)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [ -n "$NUGET_API_KEY" ]; then
          dotnet nuget push TrueMetrics.Xamarin.Android/bin/Release/*.nupkg \
            --api-key $NUGET_API_KEY \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        else
          echo "Skipping NuGet publish - NUGET_API_KEY not set"
        fi
