name: Build and Release NuGet Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PACKAGE_VERSION: '1.6.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'microsoft'
        
    - name: Install Xamarin.Android workloads
      run: dotnet workload install android
        
    - name: Restore packages
      run: msbuild TrueMetrics.Xamarin.sln /t:Restore /p:Configuration=Release
        
    - name: Build project
      run: msbuild TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj /p:Configuration=Release /p:TargetFrameworkVersion=v13.0 /p:PackageVersion=${{ env.PACKAGE_VERSION }}
          
    - name: Pack NuGet package
      run: nuget pack TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.nuspec -OutputDirectory TrueMetrics.Xamarin.Android/bin/Release -Version ${{ env.PACKAGE_VERSION }} -NoPackageAnalysis
          
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
          
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TrueMetrics.Xamarin.Android/bin/Release/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Publish to NuGet.org (optional)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      shell: pwsh
      run: |
        if ($env:NUGET_API_KEY) {
          dotnet nuget push TrueMetrics.Xamarin.Android/bin/Release/*.nupkg --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        } else {
          Write-Host "Skipping NuGet publish - NUGET_API_KEY not set"
        }
