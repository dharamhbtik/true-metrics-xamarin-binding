name: Build TrueMetrics Demo

on:
  push:
    branches: [ main, master, true_metrics_integration ]
    paths:
      - 'TrueMetricsDemo/**'
      - 'TrueMetricsDemo.Droid/**'
      - '.github/workflows/build-demo.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'TrueMetricsDemo/**'
      - 'TrueMetricsDemo.Droid/**'

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-android:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'
        
    - name: Install Xamarin.Android workloads
      run: |
        dotnet workload install android
        dotnet workload install maui-android
        
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
          
    - name: Restore NuGet packages
      run: |
        nuget restore TrueMetrics.Xamarin.sln -PackagesDirectory ${{ env.NUGET_PACKAGES }}
        
    - name: Build TrueMetricsDemo.Droid
      run: |
        msbuild TrueMetricsDemo.Droid/TrueMetricsDemo.Droid.csproj \
          /p:Configuration=Debug \
          /p:Platform=AnyCPU \
          /p:AndroidSdkDirectory=$ANDROID_SDK_ROOT \
          /restore
          
    - name: Build TrueMetricsDemo shared library
      run: |
        dotnet build TrueMetricsDemo/TrueMetricsDemo.csproj \
          --configuration Debug \
          --no-restore
          
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TrueMetricsDemo-Build
        path: |
          TrueMetricsDemo.Droid/bin/Debug/*.apk
          TrueMetricsDemo.Droid/bin/Debug/*.dll
          TrueMetricsDemo/bin/Debug/netstandard2.1/*.dll
        retention-days: 7
        
  code-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Run dotnet format check
      run: |
        dotnet format TrueMetricsDemo/TrueMetricsDemo.csproj --verify-no-changes --verbosity diagnostic || true
        
    - name: Build shared project
      run: |
        dotnet build TrueMetricsDemo/TrueMetricsDemo.csproj --configuration Release
